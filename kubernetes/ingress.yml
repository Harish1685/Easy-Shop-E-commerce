apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: easyshop-ingress
  namespace: easyshop
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - kumarharish.in
      secretName: easyshop-tls

  rules:
    - host: kumarharish.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: easyshop-service
                port:
                  number: 80