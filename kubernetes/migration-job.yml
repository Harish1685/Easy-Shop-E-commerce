apiVersion: batch/v1
kind: Job

metadata:
  name: db-migration
  namespace: easyshop

spec:
  template:
    spec:
      containers:
      - name: migration
        image: harishkumar1/easyshop-migration:9

        imagePullPolicy: Always

        envFrom:
          - configMapRef:
              name: easyshop-config
          - secretRef:
              name: easyshop-secrets

      restartPolicy: OnFailure